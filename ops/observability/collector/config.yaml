# OpenTelemetry Collector — receives OTLP from grid-game, fans signals out
# to Prometheus / Tempo / Loki.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512

  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Tail sampling: keep all error traces, 5% of normal traces.
  tail_sampling:
    decision_wait: 5s
    num_traces: 50000
    policies:
      - name: errors-always
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: normal-sample
        type: probabilistic
        probabilistic:
          sampling_percentage: 5

  # Tag every signal with cluster + environment if not already set.
  resource:
    attributes:
      - key: cluster
        value: grid-game-local
        action: upsert

  # Promote selected resource attributes to data point attributes for the prometheus
  # exporter. We do this explicitly (rather than `resource_to_telemetry_conversion: true`)
  # because that flag promotes *every* resource attribute, which races with attributes
  # added by JVM RuntimeMetrics / SDK self-monitoring and produces "duplicate label
  # names in constant and variable labels" errors — every affected data point is
  # silently dropped at the conversion step. (We saw 4k+ such errors in one window
  # during early dev; this transform makes it impossible for that class of collision
  # to recur, regardless of what new instrumentation gets added.)
  transform/promote_resource_to_metric_attrs:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["cluster"], resource.attributes["cluster"]) where resource.attributes["cluster"] != nil and attributes["cluster"] == nil
          - set(attributes["service_name"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil and attributes["service_name"] == nil
          - set(attributes["service_version"], resource.attributes["service.version"]) where resource.attributes["service.version"] != nil and attributes["service_version"] == nil
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"]) where resource.attributes["deployment.environment"] != nil and attributes["deployment_environment"] == nil

exporters:
  # Metrics → Prometheus (scraped from :8889).
  # `resource_to_telemetry_conversion` is intentionally disabled — see the
  # transform/promote_resource_to_metric_attrs processor above for the rationale.
  # The transform copies the resource attrs we want as labels (cluster, service_name,
  # service_version, deployment_environment) onto every data point in a controlled
  # way that can't collide.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: false

  # Traces → Tempo (Tempo speaks OTLP natively)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs → Loki (via the OTLP-native endpoint added in Loki 3.x)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Always-on stdout exporter for collector debugging — quiet by default.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, resource, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/promote_resource_to_metric_attrs, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
