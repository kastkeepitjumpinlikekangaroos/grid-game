# Local observability stack for grid-game.
#
# Usage:
#   cd ops/observability
#   docker compose up -d
#   # …run the server with OTel pointed at localhost:4317 (the default)…
#   open http://localhost:3000   # Grafana, anonymous-admin
#
# Tear down with `docker compose down -v` (the -v wipes volumes too).
#
# Stack:
#   otel-collector   :4317/:4318  → fans out OTLP into Prometheus / Tempo / Loki
#   prometheus       :9090        scrapes metrics from the collector
#   tempo            :3200/:4317  trace storage (OTLP-native)
#   loki             :3100        log storage
#   grafana          :3000        UI w/ pre-provisioned datasources + dashboards

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: gridgame-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # collector's own metrics
      - "8889:8889"   # prometheusexporter metrics
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: gridgame-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - "--enable-feature=exemplar-storage"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    container_name: gridgame-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo UI / API
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    container_name: gridgame-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: gridgame-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceqlSearch
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
